<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; font-size: 12px; width: 100%; padding: 4px; color: #000; line-height: 1.4; }
  .center { text-align: center; }
  .bold { font-weight: bold; }
  .shop-name { font-weight: bold; margin-bottom: 2px; }
  .shop-address { white-space: pre-wrap; margin-bottom: 2px; }
  .divider { border-top: 1px dashed #000; margin: 4px 0; }
  
  .flex-row { display: flex; }
  .flex-row > div { padding: 1px 2px; }
  .col-item { flex: 2; word-break: break-word; }
  .col-qty { flex: 1; text-align: right; }
  .col-rate { flex: 1; text-align: right; }
  .col-amt { flex: 1; text-align: right; }
  
  table { width: 100%; border-collapse: collapse; }
  .summary { border-top: 1px dashed #000; margin-top: 4px; padding-top: 4px; }
  .summary td { padding: 2px; }
  .right { text-align: right; }
</style>
</head>
<body>
  <div class="center bold shop-name" id="shop-name"></div>
  <div class="center shop-address" id="shop-address"></div>
  <div class="center" id="shop-phone"></div>
  
  <div style="text-align: center; font-weight: bold; border-bottom: 1px dashed #000; padding-bottom: 8px; margin-top: 12px; margin-bottom: 8px;">
    RETAIL INVOICE
  </div>
  
  <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
    <div>Date: <span id="invoice-date"></span></div>
    <div>Time: <span id="invoice-time"></span></div>
  </div>
  <div style="margin-bottom: 16px;">Bill No: <span id="invoice-no"></span></div>
  
  <div class="flex-row bold" style="border-bottom: 1px dashed #000; padding-bottom: 4px; margin-bottom: 4px;">
    <div class="col-item">Item</div>
    <div class="col-qty">Qty</div>
    <div class="col-rate">Rate</div>
    <div class="col-amt">Total</div>
  </div>
  
  <div id="lines"></div>
  
  <table class="summary">
    <tr><td>Subtotal</td><td class="right" id="subtotal"></td></tr>
    <tr id="discount-row" style="display:none"><td>Discount</td><td class="right" id="discount"></td></tr>
    <tr><td class="bold">Total</td><td class="right bold" id="total"></td></tr>
    <tr><td>Payment</td><td class="right" id="payment-mode"></td></tr>
    <tr><td>Paid</td><td class="right" id="amount-paid"></td></tr>
  </table>
  
  <div class="divider"></div>
  <div class="center" id="receipt-footer" style="margin-top: 8px;"></div>
</body>
</html>
